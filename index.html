<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="てんびん">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>てんびん - ダイヤのキング</title>
<style>
/* ========== BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg-card:#1a1a2e;--bg-card2:#222244;
  --accent:#e94560;--accent2:#c0392b;--gold:#f5c518;--gold-dim:#b8960f;
  --text:#e8e8e8;--text-muted:#999;--text-dim:#666;
  --success:#10b981;--danger:#ef4444;--info:#0ea5e9;--purple:#a855f7;
  --border:#2a2a4a;--radius:12px;--radius-sm:8px;
  --char-color:#888;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f0f0f5;--bg-card:#ffffff;--bg-card2:#f5f5fa;
    --text:#1a1a2e;--text-muted:#666;--text-dim:#999;
    --border:#ddd;
  }
}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
.screen{
  display:none;flex-direction:column;
  min-height:100dvh;
  padding:calc(env(safe-area-inset-top,20px) + 12px) 16px calc(env(safe-area-inset-bottom,20px) + 12px);
  max-width:480px;margin:0 auto;
}
.screen.active{display:flex}
.screen>*{animation:fadeUp .35s ease-out both}
.screen>*:nth-child(2){animation-delay:.05s}
.screen>*:nth-child(3){animation-delay:.1s}
.screen>*:nth-child(4){animation-delay:.15s}
.screen>*:nth-child(5){animation-delay:.2s}
.screen>*:nth-child(6){animation-delay:.25s}
.screen>*:nth-child(7){animation-delay:.3s}
.screen>*:nth-child(8){animation-delay:.35s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slotCycle{
  0%{transform:translateY(-100%);opacity:0}
  10%{transform:translateY(0);opacity:1}
  90%{transform:translateY(0);opacity:1}
  100%{transform:translateY(100%);opacity:0}
}

/* ========== TYPOGRAPHY ========== */
h1{font-size:2rem;font-weight:800;letter-spacing:.05em}
h2{font-size:1.4rem;font-weight:700}
h3{font-size:1.1rem;font-weight:600}

/* ========== BUTTONS ========== */
.btn{
  display:block;width:100%;padding:14px;font-size:1.05rem;font-weight:700;
  border:none;border-radius:var(--radius);cursor:pointer;
  transition:transform .1s,opacity .1s;text-align:center;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 15px rgba(233,69,96,.25)}
.btn-secondary{background:var(--bg-card);color:var(--text);border:1px solid var(--border)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1a1a2e}
.btn-sm{padding:10px 16px;font-size:.9rem;width:auto;display:inline-block}
.btn-back{background:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;padding:8px 0;text-align:left}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1rem;padding:4px}

/* ========== CARDS & BADGES ========== */
.card{background:var(--bg-card);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-rule{background:rgba(233,69,96,.15);color:var(--accent);border:1px solid rgba(233,69,96,.3)}
.badge-rule2{background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.3)}
.badge-rule3{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.badge-round{background:var(--bg-card2);color:var(--text-muted);font-size:.85rem;padding:6px 14px}
.badge-beta{background:rgba(14,165,233,.12);color:var(--info);border:1px solid rgba(14,165,233,.3);font-size:.7rem;padding:3px 10px;letter-spacing:.05em}

/* ========== SLIDER & INPUT ========== */
input[type="range"]{
  -webkit-appearance:none;appearance:none;width:100%;height:8px;
  background:var(--border);border-radius:4px;outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:30px;height:30px;
  background:var(--gold);border-radius:50%;cursor:pointer;
  box-shadow:0 2px 8px rgba(245,197,24,.4);
}
input[type="range"]::-moz-range-thumb{
  width:30px;height:30px;background:var(--gold);border-radius:50%;
  cursor:pointer;border:none;box-shadow:0 2px 8px rgba(245,197,24,.4);
}
.choice-input{
  font-size:3rem;font-weight:800;text-align:center;width:100px;
  color:var(--gold);background:transparent;border:none;
  border-bottom:2px solid var(--gold);outline:none;font-family:inherit;
}
.choice-input:focus{border-bottom-color:var(--accent)}
input[type="text"].name-input{
  width:100%;padding:10px 12px;font-size:1rem;
  background:var(--bg-card2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);outline:none;font-family:inherit;
}
input[type="text"].name-input:focus{border-color:var(--gold)}

/* ========== LANG TOGGLE ========== */
.lang-toggle{
  position:absolute;top:calc(env(safe-area-inset-top,20px) + 14px);right:16px;
  display:flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:20px;
  background:var(--bg-card);border:1px solid var(--border);
  cursor:pointer;font-size:.8rem;font-weight:600;z-index:10;
  transition:transform .1s;
}
.lang-toggle:active{transform:scale(.95)}

/* ========== TITLE SCREEN ========== */
.title-wrap{position:relative}
.title-logo{text-align:center;padding:40px 0 16px}
.title-diamond{width:60px;height:60px;margin:0 auto 16px}
.title-diamond svg{width:100%;height:100%}
.title-sub{color:var(--accent);font-size:.9rem;letter-spacing:.2em;margin-top:4px}
.title-quote{color:var(--text-muted);font-size:.8rem;text-align:center;margin:12px 0 4px;font-style:italic;line-height:1.6}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.mode-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 10px;gap:4px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;
  transition:transform .1s;text-align:center;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;
}
.mode-btn:active{transform:scale(.97)}
.mode-btn.primary{border-color:var(--accent);background:rgba(233,69,96,.06)}
.mode-btn .mode-icon{font-size:1.6rem}
.mode-btn .mode-label{font-weight:700;font-size:.9rem}
.mode-btn .mode-desc{font-size:.7rem;color:var(--text-muted)}
.mode-btn.disabled{opacity:.45;pointer-events:none}
.mode-btn .coming-soon-tag{
  position:absolute;top:6px;right:6px;
  font-size:.55rem;background:var(--bg-card2);color:var(--text-dim);
  padding:2px 6px;border-radius:4px;border:1px solid var(--border);
}
details.rules-detail{margin-top:16px}
details.rules-detail summary{
  color:var(--text-muted);font-size:.9rem;cursor:pointer;padding:8px 0;
  list-style:none;display:flex;align-items:center;gap:6px;
}
details.rules-detail summary::before{content:'▶';font-size:.7rem;transition:transform .2s}
details.rules-detail[open] summary::before{transform:rotate(90deg)}
.rules-content{
  color:var(--text-muted);font-size:.82rem;line-height:1.7;
  padding:12px;background:var(--bg-card);border-radius:var(--radius-sm);margin-top:8px;
}
.rules-content h4{color:var(--text);margin:10px 0 4px;font-size:.88rem}
.rules-content h4:first-child{margin-top:0}
.rules-content ul{padding-left:1.2em}

/* ========== AI COUNT SCREEN ========== */
.setup-title{text-align:center;margin:20px 0}
.player-count-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.player-count-row span{color:var(--text-muted);font-size:.85rem;min-width:20px;text-align:center}
.player-count-val{font-size:1.2rem;font-weight:700;color:var(--gold);text-align:center;margin-top:8px}
.setup-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}

/* ========== CHARACTER SELECT ========== */
.char-select-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.char-select-header h2{flex:1;font-size:1.15rem}
.slot-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.slot-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg-card);border:2px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;
  transition:border-color .2s,background .2s;min-height:52px;
}
.slot-card.active-slot{border-color:var(--gold);background:rgba(245,197,24,.04)}
.slot-card.filled{cursor:default}
.slot-icon{font-size:1.4rem;width:32px;text-align:center;flex-shrink:0}
.slot-info{flex:1;min-width:0}
.slot-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-catch{font-size:.72rem;color:var(--text-muted)}
.slot-empty{color:var(--text-dim);font-size:.85rem;font-style:italic}
.slot-btn{
  padding:5px 10px;font-size:.75rem;border-radius:6px;
  background:var(--bg-card2);border:1px solid var(--border);
  color:var(--text-muted);cursor:pointer;flex-shrink:0;
  transition:transform .1s;
}
.slot-btn:active{transform:scale(.95)}
.char-grid-label{font-size:.8rem;color:var(--text-muted);margin-bottom:8px;text-align:center}
.char-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;
}
.char-card{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 6px 8px;gap:2px;
  background:var(--bg-card);border:2px solid var(--border);
  border-radius:var(--radius);cursor:pointer;
  transition:transform .1s,border-color .2s;text-align:center;
  position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.char-card:active{transform:scale(.95)}
.char-card.highlighted{border-color:var(--char-color);box-shadow:0 0 12px rgba(255,255,255,.08)}
.char-card-icon{font-size:1.8rem;line-height:1}
.char-card-name{font-size:.75rem;font-weight:600;line-height:1.2}
.char-card-stars{font-size:.6rem;color:var(--gold);letter-spacing:1px}
.char-card-catch{font-size:.62rem;color:var(--text-muted);line-height:1.2}
.char-card-info{
  position:absolute;top:3px;right:4px;font-size:.65rem;
  color:var(--text-dim);cursor:pointer;line-height:1;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:var(--bg-card2);
}

/* ========== GAME SCREEN ========== */
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.active-rules{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:24px}
.player-list{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;margin-bottom:16px;padding-bottom:8px}
.player-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);
  transition:opacity .3s;
}
.player-card.eliminated{opacity:.4}
.player-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.player-name{flex:1;font-weight:600;font-size:.9rem}
.player-name small{font-weight:400;color:var(--text-muted);font-size:.75rem;margin-left:4px}
.player-pts{font-weight:700;font-size:1rem;min-width:50px;text-align:right}
.player-status{font-size:.75rem;color:var(--danger);font-weight:600}
.ai-notice{color:var(--text-dim);font-size:.72rem;text-align:center;padding:4px 0;line-height:1.5}
.input-section{
  background:var(--bg-card);border-radius:var(--radius);padding:16px;
  border:1px solid var(--border);
}
.input-value-row{display:flex;justify-content:center;margin-bottom:12px}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.slider-row span{font-size:.8rem;color:var(--text-muted);min-width:24px;text-align:center}
.adjust-row{display:flex;justify-content:center;gap:16px;margin-bottom:14px}
.btn-adjust{
  width:52px;height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-card2);color:var(--text);font-size:1.1rem;font-weight:700;cursor:pointer;
}
.btn-adjust:active{background:var(--border)}

/* ========== RESULT SCREEN ========== */
.result-header{text-align:center;margin-bottom:16px}
.target-box{
  text-align:center;padding:16px;background:var(--bg-card);
  border-radius:var(--radius);border:1px solid var(--border);margin-bottom:16px;
}
.target-label{font-size:.8rem;color:var(--text-muted);margin-bottom:4px}
.target-val{font-size:2.2rem;font-weight:800;color:var(--gold)}
.target-calc{font-size:.8rem;color:var(--text-dim);margin-top:4px}
.result-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.result-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);
  animation:fadeUp .3s ease-out both;
}
.result-card:nth-child(1){animation-delay:.15s}
.result-card:nth-child(2){animation-delay:.25s}
.result-card:nth-child(3){animation-delay:.35s}
.result-card:nth-child(4){animation-delay:.45s}
.result-card:nth-child(5){animation-delay:.55s}
.result-card.winner{border-color:var(--gold);background:rgba(245,197,24,.08)}
.result-card.invalid-pick{border-color:var(--danger);border-style:dashed;opacity:.7}
.result-icon{font-size:1.1rem;width:24px;text-align:center}
.result-name{flex:1;font-weight:600;font-size:.88rem}
.result-choice{font-size:1.1rem;font-weight:700;min-width:32px;text-align:center}
.result-dist{font-size:.75rem;color:var(--text-muted);min-width:60px;text-align:right}
.result-pts{font-weight:700;font-size:.95rem;min-width:36px;text-align:right}
.pts-zero{color:var(--success)}
.pts-neg{color:var(--danger)}
.event-box{
  padding:12px;border-radius:var(--radius-sm);margin-bottom:12px;
  font-size:.85rem;line-height:1.6;
}
.event-elim{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--danger)}
.event-rule{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.25);color:var(--accent)}
.event-special{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);color:var(--gold)}

/* ========== GAMEOVER SCREEN ========== */
.gameover-banner{text-align:center;padding:30px 0 20px}
.gameover-banner h2{font-size:1.8rem}
.gameover-banner .result-label{font-size:1rem;margin-top:8px}
.win-label{color:var(--gold);animation:pulse 1.5s infinite}
.lose-label{color:var(--accent)}
.standing-list{display:flex;flex-direction:column;gap:6px;margin:16px 0}
.standing-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);
}
.standing-rank{font-size:1.2rem;font-weight:800;min-width:32px;text-align:center}
.standing-rank.rank1{color:var(--gold)}
.standing-name{flex:1;font-weight:600}
.standing-pts{color:var(--text-muted);font-size:.9rem}
.gameover-stats{text-align:center;color:var(--text-muted);font-size:.85rem;margin:16px 0}

/* ========== HISTORY SCREEN ========== */
.history-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.history-header h2{flex:1}
.history-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.history-tab{
  flex:1;padding:10px;text-align:center;font-size:.85rem;font-weight:600;
  background:var(--bg-card);color:var(--text-muted);cursor:pointer;
  border:none;transition:background .2s,color .2s;
}
.history-tab.active{background:var(--accent);color:#fff}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{
  text-align:center;padding:12px;background:var(--bg-card);
  border-radius:var(--radius-sm);border:1px solid var(--border);
}
.stat-val{font-size:1.5rem;font-weight:800}
.stat-val.gold{color:var(--gold)}
.stat-label{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);
}
.history-date{font-size:.8rem;color:var(--text-muted);min-width:80px}
.history-detail{flex:1;font-size:.85rem}
.history-result{font-weight:700;font-size:.9rem;min-width:50px;text-align:right}
.history-result.win{color:var(--gold)}
.history-result.lose{color:var(--text-muted)}
.no-data{text-align:center;color:var(--text-dim);padding:40px 0;font-size:.9rem}
.btn-clear{margin-top:20px}

/* ========== PASS AND PLAY ========== */
.pnp-name-list{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.pnp-name-row{display:flex;align-items:center;gap:10px}
.pnp-name-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pnp-name-label{font-size:.85rem;color:var(--text-muted);min-width:32px;flex-shrink:0}
.pnp-privacy{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;gap:12px;
}
.pnp-turn-icon{font-size:3rem}
.pnp-turn-name{font-size:1.8rem;font-weight:800;color:var(--gold)}
.pnp-turn-warning{color:var(--text-muted);font-size:.9rem;line-height:1.5}
.pnp-done-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;gap:16px;
}
.pnp-done-check{font-size:3rem}
.pnp-done-text{font-size:1.1rem;font-weight:600;color:var(--success)}
.pnp-done-pass{color:var(--text-muted);font-size:.9rem}
.pnp-reveal-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;gap:20px;
}
.pnp-reveal-text{font-size:1.1rem;font-weight:600}
.pnp-reveal-players{font-size:.85rem;color:var(--text-muted);line-height:1.6}

/* ========== MODAL ========== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;animation:fadeUp .2s ease-out;
}
.modal-content{
  background:var(--bg-card);border-radius:var(--radius);
  padding:24px;max-width:320px;width:100%;
  border:1px solid var(--border);text-align:center;
  animation:scaleIn .25s ease-out;
}
.modal-icon{font-size:2.5rem;margin-bottom:8px}
.modal-name{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.modal-catch{font-size:.85rem;color:var(--text-muted);margin-bottom:8px}
.modal-stars{font-size:.85rem;color:var(--gold);margin-bottom:12px}
.modal-desc{font-size:.85rem;color:var(--text);line-height:1.6;text-align:left;margin-bottom:16px}
</style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<section id="screen-title" class="screen active">
  <div class="title-wrap">
    <div class="lang-toggle" id="lang-toggle">
      <span>🌐</span> <span id="lang-label">JP</span>
    </div>
    <div class="title-logo">
      <div class="title-diamond"><svg viewBox="0 0 60 60"><polygon points="30,4 56,30 30,56 4,30" fill="none" stroke="#e94560" stroke-width="2.5"/><text x="30" y="36" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#e94560">K</text></svg></div>
      <h1 data-i18n="title">てんびん</h1>
      <div class="title-sub" data-i18n="subtitle">ダイヤのキング</div>
      <div style="margin-top:10px"><span class="badge badge-beta">v0.2 BETA</span></div>

  if (params) {
    Object.keys(params).forEach(k => {

  }
  return str;
}

function getChar(id) { return CHARACTERS.find(c => c.id === id); }
function charName(c) { return c.name[currentLang] || c.name.ja; }
function charCatch(c) { return c.catchphrase[currentLang] || c.catchphrase.ja; }
function charDesc(c) { return c.description[currentLang] || c.description.ja; }
function starsStr(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

// === GAME STATE ===
const COLORS = ['#f5c518', '#e94560', '#0ea5e9', '#10b981', '#a855f7'];
const STORAGE_KEY = 'tenbin-history';
const PNP_STORAGE_KEY = 'tenbin-pnp-history';

let game = null;
let gameMode = null; // 'ai' or 'pnp'
let charSlots = []; // character ids for AI slots
let activeSlot = 0;
let pnpState = null;

// === HELPERS ===
function $(id) { return document.getElementById(id); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// === AI CHARACTER CHOICE ===
function charChoice(charId, roundHistory) {
  const c = getChar(charId);
  if (!c) return Math.floor(Math.random() * 101);
  return clamp(c.choose(roundHistory), 0, 100);
}

// === GAME LOGIC ===
function getActiveRules() {
  const r = [];
  if (game.eliminatedCount >= 1) r.push(1);
  if (game.eliminatedCount >= 2) r.push(2);
  if (game.eliminatedCount >= 3) r.push(3);
  return r;
}

function processRound(choices) {
  const players = game.players;
  const aliveIdx = players.map((_, i) => i).filter(i => players[i].alive);
  const vals = aliveIdx.map(i => choices[i]);
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  const target = avg * 0.8;
  const rules = getActiveRules();
  let winners = [];
  let invalidPs = [];
  let rule3Triggered = false;
  let exactMatch = false;

  // Rule 3 check
  if (rules.includes(3)) {
    const has0 = aliveIdx.some(i => choices[i] === 0);
    const pickers100 = aliveIdx.filter(i => choices[i] === 100);
    if (has0 && pickers100.length > 0) {
      winners = pickers100;
      rule3Triggered = true;
    }
  }

  if (!rule3Triggered) {
    // Rule 1: duplicates invalid
    if (rules.includes(1)) {
      const cnt = {};
      aliveIdx.forEach(i => { const c = choices[i]; cnt[c] = (cnt[c] || 0) + 1; });
      invalidPs = aliveIdx.filter(i => cnt[choices[i]] > 1);
    }
    const validIdx = aliveIdx.filter(i => !invalidPs.includes(i));
    if (validIdx.length > 0) {
      let minD = Infinity;
      validIdx.forEach(i => {
        const d = Math.abs(choices[i] - target);
        if (d < minD) minD = d;
      });
      winners = validIdx.filter(i => Math.abs(choices[i] - target) - minD < 0.0001);
      if (rules.includes(2)) {
        exactMatch = winners.some(i => Math.abs(choices[i] - target) < 0.005);
      }
    }
  }

  // Scoring
  const basePenalty = exactMatch ? -2 : -1;
  const ptChanges = {};
  aliveIdx.forEach(i => {
    ptChanges[i] = winners.includes(i) ? 0 : basePenalty;
  });
  aliveIdx.forEach(i => { players[i].points += ptChanges[i]; });

  // Eliminations
  const newElim = [];
  aliveIdx.forEach(i => {
    if (players[i].points <= -10 && players[i].alive) {
      players[i].alive = false;
      game.eliminationOrder.push(i);
      game.eliminatedCount++;
      newElim.push(i);
    }
  });

  const aliveCount = players.filter(p => p.alive).length;
  let isOver = aliveCount <= 1;
  if (gameMode === 'ai' && !players[0].alive) isOver = true;
  if (isOver) game.gameOver = true;

  const newRules = getActiveRules().filter(r => !rules.includes(r));
  const result = {
    round: game.round, choices, avg, target, winners, invalidPs,
    ptChanges, exactMatch, rule3Triggered,
    activeRules: rules, newElim, newRules, isOver
  };
  game.roundHistory.push(result);
  return result;
}

function computeRanks() {
  const ranks = {};
  const total = game.players.length;
  game.eliminationOrder.forEach((idx, i) => { ranks[idx] = total - i; });
  game.players.forEach((p, i) => { if (p.alive) ranks[i] = 1; });
  const aliveIdxs = game.players.map((_, i) => i).filter(i => game.players[i].alive);
  if (aliveIdxs.length > 1) {
    aliveIdxs.sort((a, b) => game.players[b].points - game.players[a].points);
    aliveIdxs.forEach((idx, i) => { ranks[idx] = i + 1; });
  }
  return ranks;
}

// === MODE: vs AI ===
function updateAiCountLabel() {
  const el = $('ai-player-count');
  if (!el) return;
  const v = parseInt(el.value);
  $('ai-player-count-val').textContent = t('aiCountVal', { n: v, m: v - 1 });
}

function initCharSelect() {
  const count = parseInt($('ai-player-count').value);
  const aiCount = count - 1;
  charSlots = new Array(aiCount).fill(null);
  activeSlot = 0;
  renderSlots();
  renderCharGrid();
  $('btn-start-battle').disabled = true;
  showScreen('screen-char-select');
}

function renderSlots() {
  const html = charSlots.map((cid, i) => {
    const c = cid ? getChar(cid) : null;
    const isActive = i === activeSlot;
    if (c) {
      return `<div class="slot-card${isActive ? ' active-slot' : ''}" data-slot="${i}" style="--char-color:${c.color}">
        <span class="slot-icon">${c.icon}</span>
        <div class="slot-info">
          <div class="slot-name" style="color:${c.color}">AI ${i + 1}: ${charName(c)}</div>
          <div class="slot-catch">${charCatch(c)}</div>
        </div>
        <button class="slot-btn" data-slot-random="${i}">${t('slotRandom')}</button>
      </div>`;
    } else {
      return `<div class="slot-card${isActive ? ' active-slot' : ''}" data-slot="${i}">
        <span class="slot-icon" style="opacity:.3">?</span>
        <div class="slot-info">
          <div class="slot-empty">AI ${i + 1}: ${t('slotEmpty')}</div>
        </div>
        <button class="slot-btn" data-slot-random="${i}">${t('slotRandom')}</button>
      </div>`;
    }
  }).join('');
  $('slot-list').innerHTML = html;

  // Slot click → activate
  $('slot-list').querySelectorAll('.slot-card').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('slot-btn')) return;
      activeSlot = parseInt(this.dataset.slot);
      renderSlots();
    });
  });

  // Slot random buttons
  $('slot-list').querySelectorAll('[data-slot-random]').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.slotRandom);
      animateSlotRandom(idx);
    });
  });

  updateStartButton();
}

function renderCharGrid() {
  const html = CHARACTERS.map(c => {
    return `<div class="char-card" data-char="${c.id}" style="--char-color:${c.color}">
      <span class="char-card-info" data-char-info="${c.id}">i</span>
      <span class="char-card-icon">${c.icon}</span>
      <span class="char-card-name">${charName(c)}</span>
      <span class="char-card-stars">${starsStr(c.stars)}</span>
      <span class="char-card-catch">${charCatch(c)}</span>
    </div>`;
  }).join('');
  $('char-grid').innerHTML = html;

  // Tap / long-press handling
  $('char-grid').querySelectorAll('.char-card').forEach(el => {
    let pressTimer = null;
    let isLong = false;

    el.addEventListener('pointerdown', function(e) {
      if (e.target.classList.contains('char-card-info')) return;
      isLong = false;
      pressTimer = setTimeout(() => {
        isLong = true;
        showCharDetail(this.dataset.char);
        if (navigator.vibrate) navigator.vibrate(30);
      }, 500);
    });

    el.addEventListener('pointerup', function(e) {
      clearTimeout(pressTimer);
      if (e.target.classList.contains('char-card-info')) return;
      if (!isLong) {
        selectCharForSlot(this.dataset.char);
      }
    });

    el.addEventListener('pointerleave', function() {
      clearTimeout(pressTimer);
    });
  });

  // Info buttons
  $('char-grid').querySelectorAll('[data-char-info]').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      showCharDetail(this.dataset.charInfo);
    });
  });
}

function selectCharForSlot(charId) {
  charSlots[activeSlot] = charId;
  // Auto-advance to next empty slot
  const nextEmpty = charSlots.findIndex((s, i) => i > activeSlot && s === null);
  if (nextEmpty !== -1) {
    activeSlot = nextEmpty;
  } else {
    const firstEmpty = charSlots.findIndex(s => s === null);
    if (firstEmpty !== -1) activeSlot = firstEmpty;
  }
  renderSlots();
}

function animateSlotRandom(slotIdx) {
  let count = 0;
  const interval = setInterval(() => {
    const rnd = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
    charSlots[slotIdx] = rnd.id;
    renderSlots();
    count++;
    if (count >= 10) {
      clearInterval(interval);
      const final = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
      charSlots[slotIdx] = final.id;
      renderSlots();
    }
  }, 50);
}

function allSlotsRandom() {
  let count = 0;
  const interval = setInterval(() => {
    charSlots.forEach((_, i) => {
      charSlots[i] = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)].id;
    });
    renderSlots();
    count++;
    if (count >= 10) {
      clearInterval(interval);
      charSlots.forEach((_, i) => {
        charSlots[i] = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)].id;
      });
      renderSlots();
    }
  }, 50);
}

function updateStartButton() {
  $('btn-start-battle').disabled = charSlots.some(s => s === null);
}

function showCharDetail(charId) {
  const c = getChar(charId);
  if (!c) return;
  $('modal-char-icon').textContent = c.icon;
  $('modal-char-name').textContent = charName(c);
  $('modal-char-catch').textContent = charCatch(c);
  $('modal-char-stars').textContent = t('difficulty') + ': ' + starsStr(c.stars);
  $('modal-char-desc').textContent = charDesc(c);
  $('modal-char').style.display = 'flex';
}

function startAIGame() {
  const count = parseInt($('ai-player-count').value);
  gameMode = 'ai';
  game = {
    players: [],
    round: 1,
    eliminatedCount: 0,
    eliminationOrder: [],
    roundHistory: [],
    gameOver: false
  };
  // Human player
  game.players.push({
    name: t('you'), points: 0, alive: true,
    isHuman: true, color: COLORS[0], charId: null
  });
  // AI players
  charSlots.forEach((cid, i) => {
    const c = getChar(cid);
    game.players.push({
      name: charName(c), points: 0, alive: true,
      isHuman: false, color: c.color, charId: cid,
      icon: c.icon
    });
  });
  syncChoice(50, 'choice');
  showScreen('screen-game');
  renderGame();
}

function renderGame() {
  $('round-badge').textContent = t('round', { n: game.round });
  const alive = game.players.filter(p => p.alive).length;
  $('alive-count').textContent = t('remaining', { n: alive });

  const rules = getActiveRules();
  let rh = '';
  if (rules.includes(1)) rh += '<span class="badge badge-rule">' + t('ruleDuplicate') + '</span>';
  if (rules.includes(2)) rh += '<span class="badge badge-rule2">' + t('ruleExact') + '</span>';
  if (rules.includes(3)) rh += '<span class="badge badge-rule3">' + t('ruleZero100') + '</span>';
  $('active-rules').innerHTML = rh;

  let ph = '';
  game.players.forEach(p => {
    const elim = !p.alive;
    ph += '<div class="player-card' + (elim ? ' eliminated' : '') + '">';
    ph += '<div class="player-dot" style="background:' + p.color + '"></div>';
    ph += '<div class="player-name">';
    if (p.icon) ph += '<span style="margin-right:4px">' + p.icon + '</span>';
    ph += p.name;
    ph += '</div>';
    if (elim) {
      ph += '<span class="player-status">' + t('eliminated') + '</span>';
    } else {
      const ptColor = p.points <= -7 ? 'var(--danger)' : p.points <= -4 ? 'var(--gold)' : 'var(--text)';
      ph += '<span class="player-pts" style="color:' + ptColor + '">' + p.points + ' pt</span>';
    }
    ph += '</div>';
  });
  $('player-list').innerHTML = ph;
  $('btn-confirm').disabled = false;
}

function confirmAIChoice() {
  $('btn-confirm').disabled = true;
  if (navigator.vibrate) navigator.vibrate(30);
  const humanVal = getChoice('choice');
  const aliveIdx = game.players.map((_, i) => i).filter(i => game.players[i].alive);
  const choices = {};
  aliveIdx.forEach(i => {
    if (game.players[i].isHuman) {
      choices[i] = humanVal;
    } else {
      choices[i] = charChoice(game.players[i].charId, game.roundHistory);
    }
  });
  const result = processRound(choices);
  setTimeout(() => renderResult(result), 200);
}

// === RENDER RESULT ===
function renderResult(res) {
  $('result-round-badge').textContent = t('roundResult', { n: res.round });
  $('target-val').textContent = res.target.toFixed(2);
  $('target-calc').textContent = t('targetCalc', { avg: res.avg.toFixed(2) });

  const aliveIdx = game.players.map((_, i) => i).filter(i => res.choices[i] !== undefined);
  aliveIdx.sort((a, b) => {
    const wa = res.winners.includes(a) ? 0 : 1;
    const wb = res.winners.includes(b) ? 0 : 1;
    if (wa !== wb) return wa - wb;
    return Math.abs(res.choices[a] - res.target) - Math.abs(res.choices[b] - res.target);
  });

  let rh = '';
  aliveIdx.forEach(i => {
    const p = game.players[i];
    const isW = res.winners.includes(i);
    const isInv = res.invalidPs.includes(i);
    const dist = Math.abs(res.choices[i] - res.target);
    const pc = res.ptChanges[i];
    rh += '<div class="result-card' + (isW ? ' winner' : '') + (isInv ? ' invalid-pick' : '') + '">';
    rh += '<span class="result-icon">' + (isW ? '★' : isInv ? '✕' : '·') + '</span>';
    rh += '<span class="result-name" style="color:' + p.color + '">';
    if (p.icon) rh += p.icon + ' ';
    rh += p.name + '</span>';
    rh += '<span class="result-choice">' + res.choices[i] + '</span>';
    rh += '<span class="result-dist">' + t('distLabel', { d: dist.toFixed(2) }) + '</span>';
    rh += '<span class="result-pts ' + (pc === 0 ? 'pts-zero' : 'pts-neg') + '">' + (pc >= 0 ? '+' : '') + pc + '</span>';
    rh += '</div>';
  });
  $('result-list').innerHTML = rh;

  let eh = '';
  if (res.rule3Triggered) {
    eh += '<div class="event-box event-special">' + t('eventRule3') + '</div>';
  }
  if (res.exactMatch) {
    eh += '<div class="event-box event-special">' + t('eventExact') + '</div>';
  }
  if (res.invalidPs.length > 0) {
    const names = res.invalidPs.map(i => game.players[i].name).join(', ');
    eh += '<div class="event-box event-rule">' + t('eventDuplicate', { names }) + '</div>';
  }
  if (res.newElim.length > 0) {
    res.newElim.forEach(i => {
      eh += '<div class="event-box event-elim">' + t('eventElim', { name: game.players[i].name }) + '</div>';
    });
  }
  if (res.newRules.length > 0) {
    res.newRules.forEach(r => {
      eh += '<div class="event-box event-rule">' + t('eventNewRule' + r) + '</div>';
    });
  }
  $('result-events').innerHTML = eh;

  $('btn-next').textContent = res.isOver ? t('gameEnd') : t('nextRound');
  showScreen('screen-result');
}

// === RENDER GAMEOVER ===
function renderGameOver() {
  const p = game.players;
  const rankings = computeRanks();

  let bh = '';
  if (gameMode === 'ai') {
    const humanAlive = p[0].alive;
    if (humanAlive && rankings[0] === 1) {
      bh = '<h2 style="color:var(--gold);animation:pulse 1.5s infinite">' + t('victory') + '</h2>';
      bh += '<div class="result-label" style="color:var(--gold)">' + t('yourWin') + '</div>';
    } else {
      bh = '<h2 style="color:var(--accent)">' + t('gameOverTitle') + '</h2>';
      bh += '<div class="result-label" style="color:var(--text-muted)">' + t('youEliminated') + '</div>';
      const winner = p.find(pl => pl.alive);
      if (winner) bh += '<div style="margin-top:8px;font-size:.85rem;color:var(--text-dim)">' + t('winnerIs', { name: winner.name }) + '</div>';
    }
  } else {
    // PnP
    const winner = p.find(pl => pl.alive);
    if (winner) {
      bh = '<h2 style="color:var(--gold);animation:pulse 1.5s infinite">' + t('pnpWinnerAnnounce', { name: winner.name }) + '</h2>';
    } else {
      bh = '<h2 style="color:var(--accent)">' + t('pnpGameOver') + '</h2>';
    }
  }
  $('gameover-banner').innerHTML = bh;

  const sorted = Object.keys(rankings).map(Number).sort((a, b) => rankings[a] - rankings[b]);
  let sh = '';
  sorted.forEach(i => {
    const rank = rankings[i];
    const pl = p[i];
    sh += '<div class="standing-card">';
    sh += '<span class="standing-rank' + (rank === 1 ? ' rank1' : '') + '">' + rank + '</span>';
    sh += '<span class="standing-name" style="color:' + pl.color + '">';
    if (pl.icon) sh += pl.icon + ' ';
    sh += pl.name + '</span>';
    sh += '<span class="standing-pts">' + pl.points + ' pt</span>';
    sh += '</div>';
  });
  $('standing-list').innerHTML = sh;
  $('gameover-stats').textContent = t('totalRounds', { n: game.round });

  // Save history
  if (gameMode === 'ai') {
    saveAIHistory(rankings);
  } else {
    savePnPHistory(rankings);
  }

  showScreen('screen-gameover');
}

}

function getAlivePnPPlayers() {
  return game.players.map((_, i) => i).filter(i => game.players[i].alive);
}

function startPnPTurn() {
  const alivePlayers = getAlivePnPPlayers();
  pnpState.currentPlayerIndex = 0;
  pnpState.choices = {};
  pnpState.phase = 'privacy';
  showPnPPrivacy();
}

function showPnPPrivacy() {
  const alivePlayers = getAlivePnPPlayers();
  if (pnpState.currentPlayerIndex >= alivePlayers.length) {
    // All done, show reveal
    showPnPReveal();
    return;
  }
  const pIdx = alivePlayers[pnpState.currentPlayerIndex];
  const p = game.players[pIdx];
  $('pnp-turn-icon').textContent = '🔒';
  $('pnp-turn-name').textContent = t('pnpTurnTitle', { name: p.name });
  $('pnp-turn-name').style.color = p.color;
  $('pnp-phase-privacy').style.display = 'flex';
  $('pnp-phase-input').style.display = 'none';
  $('pnp-phase-done').style.display = 'none';
  showScreen('screen-pnp-turn');
}

function showPnPInput() {
  const alivePlayers = getAlivePnPPlayers();
  const pIdx = alivePlayers[pnpState.currentPlayerIndex];
  const p = game.players[pIdx];

  $('pnp-round-badge').textContent = t('round', { n: game.round });
  const alive = game.players.filter(pl => pl.alive).length;
  $('pnp-alive-count').textContent = t('remaining', { n: alive });
  $('pnp-input-name').textContent = p.name;
  $('pnp-input-name').style.color = p.color;

  // Active rules
  const rules = getActiveRules();
  let rh = '';
  if (rules.includes(1)) rh += '<span class="badge badge-rule">' + t('ruleDuplicate') + '</span>';
  if (rules.includes(2)) rh += '<span class="badge badge-rule2">' + t('ruleExact') + '</span>';
  if (rules.includes(3)) rh += '<span class="badge badge-rule3">' + t('ruleZero100') + '</span>';
  $('pnp-active-rules').innerHTML = rh;

  syncChoice(50, 'pnp-choice');
  $('pnp-phase-privacy').style.display = 'none';
  $('pnp-phase-input').style.display = 'block';
  $('pnp-phase-done').style.display = 'none';
  $('btn-pnp-confirm').disabled = false;
}

function confirmPnPChoice() {
  $('btn-pnp-confirm').disabled = true;
  if (navigator.vibrate) navigator.vibrate(30);
  const val = getChoice('pnp-choice');
  const alivePlayers = getAlivePnPPlayers();
  const pIdx = alivePlayers[pnpState.currentPlayerIndex];
  pnpState.choices[pIdx] = val;

  $('pnp-phase-privacy').style.display = 'none';
  $('pnp-phase-input').style.display = 'none';
  $('pnp-phase-done').style.display = 'flex';
}

function nextPnPPlayer() {
  pnpState.currentPlayerIndex++;
  const alivePlayers = getAlivePnPPlayers();
  if (pnpState.currentPlayerIndex >= alivePlayers.length) {
    showPnPReveal();
  } else {
    showPnPPrivacy();
  }
}

function showPnPReveal() {
  const alive = game.players.filter(p => p.alive).length;
  $('pnp-reveal-players').textContent = t('pnpPlayersReady', { n: alive });
  showScreen('screen-pnp-reveal');
}

function revealPnPResults() {
  const result = processRound(pnpState.choices);
  renderResult(result);
}

// === HISTORY ===
function saveAIHistory(ranks) {
  const hist = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  hist.push({
    date: new Date().toISOString(),
    playerCount: game.players.length,
    rounds: game.round,
    rank: ranks[0],
    won: ranks[0] === 1,
    mode: 'ai'
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
}

function savePnPHistory(ranks) {
  const hist = JSON.parse(localStorage.getItem(PNP_STORAGE_KEY) || '[]');
  const winner = game.players.find(p => p.alive);
  hist.push({
    date: new Date().toISOString(),
    playerCount: game.players.length,
    rounds: game.round,
    winner: winner ? winner.name : '-',
    players: game.players.map(p => p.name)
  });
  localStorage.setItem(PNP_STORAGE_KEY, JSON.stringify(hist));
}

let historyTab = 'ai';

function renderHistory() {
  renderAIHistory();
  renderPnPHistory();
  updateHistoryTabs();
}

function updateHistoryTabs() {
  $('tab-ai').classList.toggle('active', historyTab === 'ai');
  $('tab-pnp').classList.toggle('active', historyTab === 'pnp');
  $('history-ai-content').style.display = historyTab === 'ai' ? '' : 'none';
  $('history-pnp-content').style.display = historyTab === 'pnp' ? '' : 'none';
}

function renderAIHistory() {
  const hist = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const total = hist.length;
  const wins = hist.filter(g => g.won).length;
  const winRate = total > 0 ? Math.round(wins / total * 100) : 0;
  const avgRank = total > 0 ? (hist.reduce((s, g) => s + g.rank, 0) / total).toFixed(1) : '-';

  $('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">${t('totalGames')}</div></div>
    <div class="stat-card"><div class="stat-val gold">${wins}</div><div class="stat-label">${t('totalWins')}</div></div>
    <div class="stat-card"><div class="stat-val">${winRate}%</div><div class="stat-label">${t('winRate')}</div></div>
    <div class="stat-card"><div class="stat-val">${avgRank}</div><div class="stat-label">${t('avgRank')}</div></div>
  `;

  if (total === 0) {
    $('history-list').innerHTML = '<div class="no-data">' + t('noData') + '</div>';
    return;
  }

  let lh = '';
  [...hist].reverse().forEach(g => {
    const d = new Date(g.date);
    const ds = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    lh += '<div class="history-item">';
    lh += '<span class="history-date">' + ds + '</span>';
    lh += '<span class="history-detail">' + g.playerCount + (currentLang === 'en' ? 'P / ' : '人 / ') + g.rounds + 'R</span>';
    lh += '<span class="history-result ' + (g.won ? 'win' : 'lose') + '">' + (g.won ? '🏆' : g.rank + (currentLang === 'en' ? 'th' : '位')) + '</span>';
    lh += '</div>';
  });
  $('history-list').innerHTML = lh;
}

function renderPnPHistory() {
  const hist = JSON.parse(localStorage.getItem(PNP_STORAGE_KEY) || '[]');
  if (hist.length === 0) {
    $('pnp-history-list').innerHTML = '<div class="no-data">' + t('noData') + '</div>';
    return;
  }
  let lh = '';
  [...hist].reverse().forEach(g => {
    const d = new Date(g.date);
    const ds = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    lh += '<div class="history-item">';
    lh += '<span class="history-date">' + ds + '</span>';
    lh += '<span class="history-detail">' + g.playerCount + (currentLang === 'en' ? 'P / ' : '人 / ') + g.rounds + 'R</span>';
    lh += '<span class="history-result win">' + t('pnpHistoryWinner', { name: g.winner }) + '</span>';
    lh += '</div>';
  });
  $('pnp-history-list').innerHTML = lh;
}

// === UI / NAVIGATION ===
function syncChoice(val, prefix) {
  prefix = prefix || 'choice';
  val = clamp(Math.round(val) || 0, 0, 100);
  $(prefix + '-slider').value = val;
  $(prefix + '-input').value = val;
}

function getChoice(prefix) {
  prefix = prefix || 'choice';
  return clamp(parseInt($(prefix + '-input').value) || 0, 0, 100);
}

// === EVENT LISTENERS ===

// Language
$('lang-toggle').addEventListener('click', toggleLang);

// Mode buttons
$('btn-mode-ai').addEventListener('click', function() {
  updateAiCountLabel();
  showScreen('screen-ai-count');
});

$('btn-mode-pnp').addEventListener('click', function() {
  updatePnpCountLabel();
  renderPnpNames();
  showScreen('screen-pnp-setup');
});

$('btn-mode-history').addEventListener('click', function() {
  historyTab = 'ai';
  renderHistory();
  showScreen('screen-history');
});

// AI count screen
$('ai-player-count').addEventListener('input', updateAiCountLabel);
$('btn-ai-next').addEventListener('click', initCharSelect);
$('btn-back-ai-count').addEventListener('click', function() { showScreen('screen-title'); });

// Character select
$('btn-back-char').addEventListener('click', function() { showScreen('screen-ai-count'); });
$('btn-all-random').addEventListener('click', allSlotsRandom);
$('btn-start-battle').addEventListener('click', startAIGame);

// Modal
$('modal-char-close').addEventListener('click', function() { $('modal-char').style.display = 'none'; });
$('modal-char').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

// Game: AI choice sync
$('choice-slider').addEventListener('input', function() { syncChoice(+this.value, 'choice'); });
$('choice-input').addEventListener('change', function() { syncChoice(+this.value, 'choice'); });
$('choice-input').addEventListener('blur', function() { syncChoice(+this.value, 'choice'); });
$('btn-minus5').addEventListener('click', function() { syncChoice(getChoice('choice') - 5, 'choice'); });
$('btn-minus1').addEventListener('click', function() { syncChoice(getChoice('choice') - 1, 'choice'); });
$('btn-plus1').addEventListener('click', function() { syncChoice(getChoice('choice') + 1, 'choice'); });
$('btn-plus5').addEventListener('click', function() { syncChoice(getChoice('choice') + 5, 'choice'); });
$('btn-confirm').addEventListener('click', confirmAIChoice);

// PnP choice sync
$('pnp-choice-slider').addEventListener('input', function() { syncChoice(+this.value, 'pnp-choice'); });
$('pnp-choice-input').addEventListener('change', function() { syncChoice(+this.value, 'pnp-choice'); });
$('pnp-choice-input').addEventListener('blur', function() { syncChoice(+this.value, 'pnp-choice'); });
$('pnp-btn-minus5').addEventListener('click', function() { syncChoice(getChoice('pnp-choice') - 5, 'pnp-choice'); });
$('pnp-btn-minus1').addEventListener('click', function() { syncChoice(getChoice('pnp-choice') - 1, 'pnp-choice'); });
$('pnp-btn-plus1').addEventListener('click', function() { syncChoice(getChoice('pnp-choice') + 1, 'pnp-choice'); });
$('pnp-btn-plus5').addEventListener('click', function() { syncChoice(getChoice('pnp-choice') + 5, 'pnp-choice'); });
$('btn-pnp-confirm').addEventListener('click', confirmPnPChoice);

// Result / next
$('btn-next').addEventListener('click', function() {
  if (game.gameOver) {
    renderGameOver();
  } else {
    game.round++;
    if (gameMode === 'ai') {
      syncChoice(50, 'choice');
      showScreen('screen-game');
      renderGame();
    } else {
      startPnPTurn();
    }
  }
});

$('btn-return').addEventListener('click', function() {
  game = null;
  gameMode = null;
  pnpState = null;
  showScreen('screen-title');
});

// PnP setup
$('pnp-player-count').addEventListener('input', function() {
  updatePnpCountLabel();
  renderPnpNames();
});
$('btn-back-pnp').addEventListener('click', function() { showScreen('screen-title'); });
$('btn-pnp-start').addEventListener('click', startPnPGame);

// PnP turn flow
$('btn-pnp-ready').addEventListener('click', showPnPInput);
$('btn-pnp-next-player').addEventListener('click', nextPnPPlayer);
$('btn-pnp-reveal').addEventListener('click', revealPnPResults);

// History
$('tab-ai').addEventListener('click', function() { historyTab = 'ai'; updateHistoryTabs(); });
$('tab-pnp').addEventListener('click', function() { historyTab = 'pnp'; updateHistoryTabs(); });
$('btn-back-hist').addEventListener('click', function() { showScreen('screen-title'); });
$('btn-clear-hist').addEventListener('click', function() {
  if (confirm(t('clearConfirm'))) {
    if (historyTab === 'ai') {
      localStorage.removeItem(STORAGE_KEY);
    } else {
      localStorage.removeItem(PNP_STORAGE_KEY);
    }
    renderHistory();
  }
});

// === PWA ===
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}

// === INIT ===
applyI18n();
updateAiCountLabel();
updatePnpCountLabel();
</script>
</body>
</html>
